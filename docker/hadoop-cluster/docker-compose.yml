# DSC Auto-Tiering 개발용 Hadoop 클러스터 (single-node + External SPS)
#
# 운영 의도 (제안서 §3.2):
#   - dfs.storage.policy.satisfier.mode = external 로 NameNode 내장 SPS 비활성화
#   - 별도 컨테이너에서 'hdfs sps' 데몬을 띄워 NN 부하 격리
#   - DataNode 한 대에 [SSD]/[DISK]/[ARCHIVE] 세 가지 storage type 을 mount
#     (실제 미디어 분리는 아님 — HDFS 의 storage-type 라벨링 검증용)
#
# 사용:
#   docker compose up -d
#   docker compose exec namenode hdfs dfsadmin -report

services:
  namenode:
    image: apache/hadoop:3.3.6
    hostname: namenode
    user: hadoop
    command:
      - bash
      - -c
      - |
        if [ ! -d /data/namenode/current ]; then
          hdfs namenode -format -nonInteractive -force
        fi
        exec hdfs namenode
    ports:
      - "9870:9870"   # NameNode Web UI
      - "8020:8020"   # NameNode RPC
    volumes:
      - ./conf/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./conf/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - namenode-data:/data/namenode
    networks: [dsc]

  datanode:
    image: apache/hadoop:3.3.6
    hostname: datanode
    user: hadoop
    depends_on: [namenode]
    command: ["hdfs", "datanode"]
    volumes:
      - ./conf/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./conf/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - datanode-ssd:/data/ssd
      - datanode-disk:/data/disk
      - datanode-archive:/data/archive
    networks: [dsc]

  # External SPS 데몬: NameNode 와 동일 클러스터 conf 를 사용하지만 별도 프로세스
  external-sps:
    image: apache/hadoop:3.3.6
    hostname: external-sps
    user: hadoop
    depends_on: [namenode, datanode]
    command: ["hdfs", "sps"]
    volumes:
      - ./conf/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./conf/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
    networks: [dsc]

  postgres:
    image: postgres:16
    hostname: postgres
    environment:
      POSTGRES_DB: dsc_tiering
      POSTGRES_USER: dsc
      POSTGRES_PASSWORD: dsc
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # docker-entrypoint-initdb.d 안의 .sql 은 컨테이너 최초 부팅 시 자동 실행
      - ../../db/migrations:/docker-entrypoint-initdb.d:ro
    networks: [dsc]

networks:
  dsc:
    driver: bridge

volumes:
  namenode-data:
  datanode-ssd:
  datanode-disk:
  datanode-archive:
  postgres-data:
